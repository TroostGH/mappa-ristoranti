<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mappa Ristoranti Vegan</title>
  <link rel="stylesheet" href="styles.css?v=8" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#64803f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mappa Ristoranti" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png" />
  <link rel="icon" href="icons/icon-192.png" />
</head>
<body>
  <header>
    <div class="brand">
      <img class="logo" src="icons/icon-192.png" alt="Mappa Ristoranti" />
      <h1>Mappa Ristoranti</h1>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="list">📋 Elenco</button>
      <button class="tab" data-view="map">🗺️ Mappa</button>
      <button class="tab" data-view="add">➕ Aggiungi</button>
    </nav>
  </header>

  <main>
    <!-- LIST VIEW -->
    <section id="view-list" class="view active">
      <div class="toolbar">
        <div class="search-row">
          <input type="search" id="list-search" placeholder="🔎 Filtra per nome, città o tag…" />
          <select id="sort-by" title="Ordina per">
            <option value="recent">🕒 Più recenti</option>
            <option value="oldest">📅 Più vecchi</option>
            <option value="name">🔤 Nome A→Z</option>
          </select>
        </div>
        <div class="tag-filters" id="tag-filters"></div>
        <div class="counter" id="list-counter">Caricamento…</div>
      </div>
      <div id="restaurant-list" class="restaurant-list"></div>
    </section>

    <!-- MAP VIEW -->
    <section id="view-map" class="view">
      <div class="map-search-overlay">
        <input type="text" id="map-search" placeholder="🔎 Cerca una città…" autocomplete="off" />
        <div id="map-search-results" class="map-search-results hidden"></div>
      </div>
      <div id="map"></div>
    </section>

    <!-- ADD VIEW -->
    <section id="view-add" class="view">
      <div class="add-panel">
        <h2>Aggiungi un nuovo ristorante</h2>
        <p class="hint">Cerca il nome del ristorante: i risultati arrivano direttamente da Google Maps. Clicca sul risultato giusto per confermarlo.</p>
        <div class="search-box">
          <input type="text" id="places-search" placeholder="Es. Soul Kitchen Milano" autocomplete="off" />
        </div>
        <div id="places-status" class="places-status hidden"></div>
        <div id="places-results" class="places-results"></div>

        <div id="confirm-panel" class="confirm-panel hidden">
          <h3>Conferma e personalizza</h3>
          <div id="confirm-summary"></div>
          <label>Tag (separati da virgola)</label>
          <input type="text" id="confirm-tags" placeholder="Vegan, Pizza, Per provare" />
          <label>Nota personale (opzionale)</label>
          <textarea id="confirm-note" rows="2" placeholder="Es. Pizza al tartufo eccellente!"></textarea>
          <div class="btn-row">
            <button id="confirm-save" class="primary">💾 Salva ristorante</button>
            <button id="confirm-cancel">Annulla</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Detail modal -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">×</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Firebase v10 modular SDK via CDN -->
  <script type="module" src="config.js?v=8"></script>
  <script type="module" src="app.js?v=8"></script>

  <!-- Bottone "Installa app" che appare quando il browser supporta l'installazione PWA -->
  <button id="install-btn" class="install-btn hidden">📲 Installa app</button>

  <!-- Google Maps JS API: la chiave viene letta da config.js e iniettata dinamicamente -->
  <script>
    window.__loadGoogleMaps = function (apiKey) {
      const s = document.createElement('script');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places&loading=async&callback=__onGoogleMapsReady`;
      s.async = true;
      s.defer = true;
      document.head.appendChild(s);
    };

    // Service worker (richiesto per PWA install)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW reg failed', err));
      });
    }

    // Cattura prompt di installazione e mostra il bottone custom
    let deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      document.getElementById('install-btn')?.classList.remove('hidden');
    });
    document.getElementById('install-btn')?.addEventListener('click', async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      document.getElementById('install-btn')?.classList.add('hidden');
    });
    window.addEventListener('appinstalled', () => {
      document.getElementById('install-btn')?.classList.add('hidden');
    });
  </script>
</body>
</html>
